services:
  db:
    image: postgres:15-alpine
    container_name: synapse_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: server/SynapseSRE.Api/Dockerfile
    container_name: synapse_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__DurationInMinutes=${JWT_DURATION}
      - AI__ProviderKey=${AI__ProviderKey}
      - AI__BaseUrl=${AI__BaseUrl}
      - AI__ModelId=${AI__ModelId}
      - Notifications__TeamEmail=${Notifications__TeamEmail}
      - Notifications__SlackWebhookUrl=${Notifications__SlackWebhookUrl}
      - Notifications__SmtpHost=${Notifications__SmtpHost}
      - Notifications__SmtpPort=${Notifications__SmtpPort}
      - Notifications__SmtpUser=${Notifications__SmtpUser}
      - Notifications__SmtpPass=${Notifications__SmtpPass}
      - Notifications__FromEmail=${Notifications__FromEmail}
      - Notifications__GitHubToken=${Notifications__GitHubToken}
      - Notifications__GitHubOwner=${Notifications__GitHubOwner}
      - Notifications__GitHubRepo=${Notifications__GitHubRepo}
    ports:
      - "5210:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client/SynapseSRE.Web
      dockerfile: Dockerfile
    container_name: synapse_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data: