services:
  db:
    image: postgres:15-alpine
    container_name: synapse-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-synapse_password}
      POSTGRES_DB: ${DB_NAME:-synapse_sre_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - synapse-network

# Red interna 
networks:
  synapse-network:
    driver: bridge

# Volumen para que los datos no se borren al apagar Docker
volumes:
  postgres-data: